<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d2e;--card:#252840;--border:#2e3250;
  --accent:#6c63ff;--text:#e2e8f0;--muted:#8892a4;--shadow:#0006;
  --done:#10b981;--backlog:#9E9E9E;--todo:#2196F3;--inprog:#FF9800;--review:#9C27B0;
  --high:#ef4444;--med:#f59e0b;--low:#10b981;
}
[data-theme="light"]{
  --bg:#f0f2f5;--surface:#ffffff;--card:#f8f9fc;--border:#d1d5db;
  --accent:#6c63ff;--text:#1e2029;--muted:#64748b;--shadow:#0001;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .2s,color .2s}

.dash-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}

.dash-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}

.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;min-height:120px;justify-content:center;transition:box-shadow .2s,border-color .2s}
.kpi-card:hover{border-color:var(--accent);box-shadow:0 4px 14px var(--shadow)}
.kpi-card.kpi-alert{border-color:var(--high);background:rgba(239,68,68,.08)}
.kpi-icon{font-size:1.3rem}
.kpi-value{font-size:1.6rem;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
.kpi-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.kpi-sub{font-size:.68rem;color:var(--muted);margin-top:2px}

.kpi-ring{width:56px;height:56px;border-radius:50%;background:conic-gradient(var(--ring-color) calc(var(--pct) * 1%),var(--border) 0);display:flex;align-items:center;justify-content:center;position:relative}
.kpi-ring::after{content:'';width:42px;height:42px;border-radius:50%;background:var(--surface);position:absolute}
.kpi-ring-val{position:relative;z-index:1;font-size:.82rem;font-weight:800;color:var(--text)}

.kpi-bar{width:100%;max-width:120px;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px}
.kpi-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s ease}

.dash-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:box-shadow .2s}
.dash-panel:hover{box-shadow:0 4px 14px var(--shadow)}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-hdr h3{font-size:.85rem;font-weight:700;color:var(--text)}
.panel-body{padding:16px}

.dash-row{display:grid;gap:14px}
.dash-row-2col{grid-template-columns:repeat(2,1fr)}
.dash-row-full{grid-template-columns:1fr}
@media(max-width:700px){
  .dash-row-2col{grid-template-columns:1fr}
  .dash-kpi-row{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
}

.stacked-chart{display:flex;flex-direction:column;gap:10px}
.chart-row{display:flex;align-items:center;gap:10px}
.chart-label{width:100px;font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;text-align:right}
.chart-track{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden;display:flex}
.chart-seg{height:100%;transition:width .4s ease;min-width:0}
.chart-seg:first-child{border-radius:6px 0 0 6px}
.chart-seg:last-child{border-radius:0 6px 6px 0}
.chart-seg:only-child{border-radius:6px}
.chart-seg:hover{opacity:.85}
.chart-count{font-size:.72rem;font-weight:700;color:var(--muted);width:36px;text-align:right;flex-shrink:0}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:64px;font-size:.78rem;font-weight:600;color:var(--text);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease}
.bar-val{font-size:.75rem;font-weight:700;color:var(--muted);width:30px;text-align:right;flex-shrink:0}

.health-table{width:100%;border-collapse:collapse;font-size:.78rem}
.health-table thead th{text-align:left;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
.health-table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
.health-table tbody tr:hover{background:var(--bg)}
.health-table tbody tr:last-child{border-bottom:none}
.health-table td{padding:8px;vertical-align:middle}
.ht-board{font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.ht-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ht-num{text-align:center;font-weight:600;font-variant-numeric:tabular-nums}
.ht-overdue{color:var(--high)}
.health-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.health-good{background:var(--done)}
.health-warn{background:var(--inprog)}
.health-bad{background:var(--high)}

.adherence-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto}
.adherence-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;transition:background .15s}
.adherence-item:hover{background:var(--card)}
.adh-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;align-self:flex-start;margin-top:5px}
.adh-content{flex:1;min-width:0}
.adh-title{font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adh-meta{font-size:.7rem;color:var(--muted);margin-top:2px}
.adh-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.adh-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:10px}
.adh-badge-high{background:#ef444422;color:var(--high)}
.adh-badge-med{background:#f59e0b22;color:var(--med)}
.adh-badge-low{background:#10b98122;color:var(--low)}
.adh-badge-overdue{background:#ef444418;color:var(--high)}
.adh-badge-risk{background:#f59e0b18;color:var(--inprog)}
.adh-pct{flex-shrink:0}
.adh-pct-ring{width:36px;height:36px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--pct) * 1%),var(--border) 0);display:flex;align-items:center;justify-content:center;position:relative}
.adh-pct-ring::after{content:'';width:26px;height:26px;border-radius:50%;background:var(--bg);position:absolute}
.adh-pct-val{position:relative;z-index:1;font-size:.55rem;font-weight:700;color:var(--text)}
.adh-empty{text-align:center;color:var(--muted);padding:24px;font-size:.82rem}

.histogram{padding:8px 0}
.hist-bars{display:flex;align-items:flex-end;justify-content:space-around;height:140px;gap:8px;padding:0 12px;border-bottom:1px solid var(--border)}
.hist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;max-width:80px}
.hist-val{font-size:.68rem;font-weight:700;color:var(--muted)}
.hist-bar{width:100%;max-width:48px;height:calc(var(--h) * 1%);background:var(--accent);border-radius:4px 4px 0 0;transition:height .4s ease;min-height:2px}
.hist-bar:hover{opacity:.8}
.hist-label{font-size:.67rem;color:var(--muted);font-weight:600;white-space:nowrap;padding-top:6px}

.na-text{color:var(--muted);font-size:.85rem;text-align:center;padding:20px}
</style>
</head>
<body>

<div class="dash-body" id="dashBody">
  <div class="dash-kpi-row" id="kpiRow"></div>

  <div class="dash-row dash-row-2col">
    <div class="dash-panel" id="panelStatus">
      <div class="panel-hdr"><h3>Status Distribution</h3></div>
      <div class="panel-body" id="statusChart"></div>
    </div>
    <div class="dash-panel" id="panelPriority">
      <div class="panel-hdr"><h3>Priority Breakdown</h3></div>
      <div class="panel-body" id="priorityChart"></div>
    </div>
  </div>

  <div class="dash-row dash-row-2col">
    <div class="dash-panel" id="panelHealth">
      <div class="panel-hdr"><h3>Board Health</h3></div>
      <div class="panel-body" id="healthTable"></div>
    </div>
    <div class="dash-panel" id="panelSchedule">
      <div class="panel-hdr"><h3>Schedule Adherence</h3></div>
      <div class="panel-body" id="scheduleList"></div>
    </div>
  </div>

  <div class="dash-row dash-row-full">
    <div class="dash-panel" id="panelProgress">
      <div class="panel-hdr"><h3>Progress Distribution</h3></div>
      <div class="panel-body" id="progressHist"></div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
//  Dashboard — Model / Renderer / App
// ═══════════════════════════════════════════════════════════════════

const _today = new Date();
_today.setHours(0, 0, 0, 0);

const STATUS_ORDER = ['backlog', 'todo', 'inprog', 'review', 'done'];
const STATUS_LABELS = { backlog: 'Backlog', todo: 'To Do', inprog: 'In Progress', review: 'Review', done: 'Done' };

// ── DashboardModel ───────────────────────────────────────
class DashboardModel {
  constructor() {
    this.boards = [];
    this.tasks = [];
    this.allTasks = [];
  }

  load(data, filterBoardId) {
    const boards = (data.boards || []).filter(b => !b.IsDeleted);
    let tasks = (data.tasks || []).filter(t => !t.isDeleted);

    if (filterBoardId && filterBoardId !== 'all') {
      tasks = tasks.filter(t => String(t.boardId) === String(filterBoardId));
    }

    // Build children map for subtask rollup
    const childMap = {};
    tasks.forEach(t => {
      if (t.parentId) {
        const pk = String(t.parentId);
        if (!childMap[pk]) childMap[pk] = [];
        childMap[pk].push(t);
      }
    });

    tasks.forEach(t => {
      t._isTopLevel = !t.parentId;
      const board = boards.find(b => String(b.id) === String(t.boardId));
      t._boardName = board ? board.name : '?';
      t._boardColor = board ? board.color || '#6c63ff' : '#6c63ff';
      t._pct = clamp(t.pctComplete || 0, 0, 100);

      if (t.startDate && t.endDate) {
        const sd = parseDate(t.startDate);
        const ed = parseDate(t.endDate);
        t._daysTotal = Math.max(0, daysBetween(sd, ed));
        t._daysElapsed = Math.max(0, daysBetween(sd, ed < _today ? ed : _today));
        t._daysRemaining = Math.max(0, daysBetween(_today, ed));
        t._isOverdue = _today > ed && t.status !== 'done';
        t._isAtRisk = t._daysRemaining <= 2 && t._daysRemaining > 0 && t.status !== 'done' && t.status !== 'review';
        t._expectedPct = t._daysTotal > 0 ? Math.round((t._daysElapsed / t._daysTotal) * 100) : (_today > ed ? 100 : null);
        t._pctDelta = t._expectedPct != null ? t._pct - t._expectedPct : null;
        t._hasDates = true;
      } else {
        t._hasDates = false;
        t._isOverdue = false;
        t._isAtRisk = false;
        t._daysRemaining = 0;
        t._daysTotal = 0;
        t._daysElapsed = 0;
        t._expectedPct = null;
        t._pctDelta = null;
      }

      // Subtask rollup
      const kids = childMap[String(t.id)];
      if (kids && kids.length) {
        const sum = kids.reduce((a, c) => a + clamp(c.pctComplete || 0, 0, 100), 0);
        t._rolledUpPct = Math.round(sum / kids.length);
      } else {
        t._rolledUpPct = t._pct;
      }
    });

    this.boards = boards;
    this.allTasks = tasks.slice();
    this.tasks = tasks;
  }

  getKPIs() {
    const t = this.tasks;
    const total = t.length;
    const topLevel = t.filter(x => x._isTopLevel).length;
    const subtasks = total - topLevel;
    const doneCount = t.filter(x => x.status === 'done').length;
    const completionRate = total > 0 ? Math.round(doneCount / total * 100) : null;
    const overdueCount = t.filter(x => x._isOverdue).length;
    const atRiskCount = t.filter(x => x._isAtRisk).length;
    const notDone = t.filter(x => x.status !== 'done');
    const avgProgress = notDone.length > 0 ? Math.round(notDone.reduce((a, x) => a + x._pct, 0) / notDone.length) : null;
    const inProgressCount = t.filter(x => x.status === 'inprog').length;
    const notDoneCount = notDone.length;
    const boardIds = new Set(t.map(x => String(x.boardId)));
    return {
      total, topLevel, subtasks, doneCount, completionRate,
      overdueCount, atRiskCount, avgProgress, inProgressCount,
      notDoneCount, activeBoardCount: boardIds.size, totalBoardCount: this.boards.length
    };
  }

  getStatusDist() {
    const map = {};
    this.tasks.forEach(t => {
      const bk = String(t.boardId);
      if (!map[bk]) map[bk] = { boardName: t._boardName, boardColor: t._boardColor, counts: {} };
      const s = t.status || 'backlog';
      map[bk].counts[s] = (map[bk].counts[s] || 0) + 1;
    });
    return Object.values(map).map(b => {
      const total = Object.values(b.counts).reduce((a, c) => a + c, 0);
      const segments = STATUS_ORDER.map(s => {
        const count = b.counts[s] || 0;
        return { status: s, count, pct: total > 0 ? Math.round(count / total * 100) : 0 };
      });
      return { boardName: b.boardName, boardColor: b.boardColor, total, segments };
    }).sort((a, b) => b.total - a.total);
  }

  getPriorityDist() {
    let high = 0, medium = 0, low = 0;
    this.tasks.forEach(t => {
      const p = (t.priority || '').toLowerCase();
      if (p === 'high') high++;
      else if (p === 'medium') medium++;
      else if (p === 'low') low++;
    });
    return { high, medium, low, max: Math.max(high, medium, low, 1) };
  }

  getBoardHealth() {
    const map = {};
    this.tasks.forEach(t => {
      const bk = String(t.boardId);
      if (!map[bk]) {
        map[bk] = { name: t._boardName, color: t._boardColor, tasks: [], doneCount: 0, overdueCount: 0, pctSum: 0 };
      }
      const b = map[bk];
      b.tasks.push(t);
      if (t.status === 'done') b.doneCount++;
      if (t._isOverdue) b.overdueCount++;
      b.pctSum += t._pct;
    });
    return Object.values(map).map(b => {
      const taskCount = b.tasks.length;
      const doneRate = taskCount > 0 ? Math.round(b.doneCount / taskCount * 100) : 0;
      const avgPct = taskCount > 0 ? Math.round(b.pctSum / taskCount) : 0;
      let health;
      if (doneRate >= 70 && b.overdueCount === 0) health = 'good';
      else if (doneRate < 40 || b.overdueCount >= 3) health = 'bad';
      else health = 'warn';
      return { name: b.name, color: b.color, taskCount, doneRate, overdueCount: b.overdueCount, avgPct, health };
    });
  }

  getAdherenceList() {
    const items = this.tasks.filter(t => t._isOverdue || t._isAtRisk).map(t => {
      let label;
      if (t._isOverdue) {
        const ed = parseDate(t.endDate);
        const days = daysBetween(ed, _today);
        label = days + ' day' + (days !== 1 ? 's' : '') + ' overdue';
      } else {
        label = t._daysRemaining === 1 ? 'due tomorrow' : 'due in ' + t._daysRemaining + ' days';
      }
      return { title: t.title, boardName: t._boardName, priority: (t.priority || '').toLowerCase(), pct: t._pct, isOverdue: t._isOverdue, label };
    });
    items.sort((a, b) => {
      if (a.isOverdue && !b.isOverdue) return -1;
      if (!a.isOverdue && b.isOverdue) return 1;
      return 0;
    });
    return items;
  }

  getHistogram() {
    const buckets = [
      { label: '0%', min: 0, max: 0, count: 0 },
      { label: '1\u201325%', min: 1, max: 25, count: 0 },
      { label: '26\u201350%', min: 26, max: 50, count: 0 },
      { label: '51\u201375%', min: 51, max: 75, count: 0 },
      { label: '76\u201399%', min: 76, max: 99, count: 0 },
      { label: '100%', min: 100, max: 100, count: 0 }
    ];
    this.tasks.forEach(t => {
      const p = t._pct;
      for (const b of buckets) { if (p >= b.min && p <= b.max) { b.count++; break; } }
    });
    const maxC = Math.max(...buckets.map(b => b.count), 1);
    return buckets.map(b => ({ label: b.label, count: b.count, hPct: Math.round(b.count / maxC * 100) }));
  }
}

// ── DashboardRenderer ────────────────────────────────────
class DashboardRenderer {
  renderAll(model) {
    this.renderKPIs(model.getKPIs());
    this.renderStatusChart(model.getStatusDist());
    this.renderPriorityChart(model.getPriorityDist());
    this.renderHealthTable(model.getBoardHealth());
    this.renderAdherenceList(model.getAdherenceList());
    this.renderHistogram(model.getHistogram());
  }

  renderKPIs(k) {
    const el = document.getElementById('kpiRow');
    if (!el) return;

    const rate = k.completionRate;
    const rateDisplay = rate != null ? rate + '%' : 'N/A';
    const ringColor = rate == null ? 'var(--muted)' : rate >= 70 ? 'var(--done)' : rate >= 40 ? '#f59e0b' : 'var(--high)';
    const ringPct = rate != null ? rate : 0;

    const avgP = k.avgProgress;
    const avgDisplay = avgP != null ? avgP + '%' : 'N/A';
    const avgBar = avgP != null ? avgP : 0;

    el.innerHTML = [
      this._kpi('\u{1F4CB}', 'Total Tasks', k.total, k.topLevel + ' top-level, ' + k.subtasks + ' subtasks'),
      // Completion ring
      '<div class="kpi-card">' +
        '<div class="kpi-icon">\u2705</div>' +
        '<div class="kpi-ring" style="--pct:' + ringPct + ';--ring-color:' + ringColor + '">' +
          '<span class="kpi-ring-val">' + rateDisplay + '</span>' +
        '</div>' +
        '<div class="kpi-label">Completion Rate</div>' +
        '<div class="kpi-sub">' + k.doneCount + ' of ' + k.total + ' done</div>' +
      '</div>',
      // Overdue
      '<div class="kpi-card' + (k.overdueCount > 0 ? ' kpi-alert' : '') + '">' +
        '<div class="kpi-icon">\u26A0\uFE0F</div>' +
        '<div class="kpi-value">' + k.overdueCount + '</div>' +
        '<div class="kpi-label">Overdue Tasks</div>' +
        '<div class="kpi-sub">' + k.atRiskCount + ' at risk</div>' +
      '</div>',
      // Avg progress
      '<div class="kpi-card">' +
        '<div class="kpi-icon">\u{1F4C8}</div>' +
        '<div class="kpi-value">' + avgDisplay + '</div>' +
        '<div class="kpi-label">Avg Progress</div>' +
        '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + avgBar + '%"></div></div>' +
        '<div class="kpi-sub">across active tasks</div>' +
      '</div>',
      // In progress
      this._kpi('\u{1F504}', 'In Progress', k.inProgressCount, 'of ' + k.notDoneCount + ' remaining'),
      // Active boards
      this._kpi('\u{1F4C1}', 'Active Boards', k.activeBoardCount, 'of ' + k.totalBoardCount + ' total')
    ].join('');
  }

  _kpi(icon, label, value, sub) {
    return '<div class="kpi-card">' +
      '<div class="kpi-icon">' + icon + '</div>' +
      '<div class="kpi-value">' + value + '</div>' +
      '<div class="kpi-label">' + esc(label) + '</div>' +
      '<div class="kpi-sub">' + esc(sub) + '</div>' +
    '</div>';
  }

  renderStatusChart(dist) {
    const el = document.getElementById('statusChart');
    if (!el) return;
    if (!dist.length) { el.innerHTML = '<div class="na-text">No data</div>'; return; }

    const rows = dist.map(b =>
      '<div class="chart-row">' +
        '<div class="chart-label" title="' + esc(b.boardName) + '">' + esc(b.boardName) + '</div>' +
        '<div class="chart-track">' +
          b.segments.filter(s => s.count > 0).map(s =>
            '<div class="chart-seg" style="width:' + s.pct + '%;background:var(--' + s.status + ')" title="' + esc(STATUS_LABELS[s.status]) + ': ' + s.count + '"></div>'
          ).join('') +
        '</div>' +
        '<div class="chart-count">' + b.total + '</div>' +
      '</div>'
    ).join('');

    const legend = STATUS_ORDER.map(s =>
      '<div class="legend-item"><span class="legend-dot" style="background:var(--' + s + ')"></span>' + STATUS_LABELS[s] + '</div>'
    ).join('');

    el.innerHTML = '<div class="stacked-chart">' + rows + '<div class="chart-legend">' + legend + '</div></div>';
  }

  renderPriorityChart(pri) {
    const el = document.getElementById('priorityChart');
    if (!el) return;
    const mx = pri.max;
    const bar = (label, count, cssVar) =>
      '<div class="bar-row">' +
        '<div class="bar-label">' + label + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(count / mx * 100) + '%;background:var(--' + cssVar + ')"></div></div>' +
        '<div class="bar-val">' + count + '</div>' +
      '</div>';
    el.innerHTML = '<div class="bar-chart">' +
      bar('High', pri.high, 'high') +
      bar('Medium', pri.medium, 'med') +
      bar('Low', pri.low, 'low') +
    '</div>';
  }

  renderHealthTable(health) {
    const el = document.getElementById('healthTable');
    if (!el) return;
    if (!health.length) { el.innerHTML = '<div class="na-text">No boards</div>'; return; }

    const head = '<thead><tr><th>Board</th><th>Tasks</th><th>Done%</th><th>Overdue</th><th>Avg%</th><th></th></tr></thead>';
    const rows = health.map(b =>
      '<tr>' +
        '<td><div class="ht-board"><span class="ht-dot" style="background:' + esc(b.color) + '"></span>' + esc(b.name) + '</div></td>' +
        '<td class="ht-num">' + b.taskCount + '</td>' +
        '<td class="ht-num">' + b.doneRate + '%</td>' +
        '<td class="ht-num' + (b.overdueCount > 0 ? ' ht-overdue' : '') + '">' + b.overdueCount + '</td>' +
        '<td class="ht-num">' + b.avgPct + '%</td>' +
        '<td><span class="health-dot health-' + b.health + '"></span></td>' +
      '</tr>'
    ).join('');
    el.innerHTML = '<table class="health-table">' + head + '<tbody>' + rows + '</tbody></table>';
  }

  renderAdherenceList(items) {
    const el = document.getElementById('scheduleList');
    if (!el) return;
    if (!items.length) {
      el.innerHTML = '<div class="adh-empty">\u2705 No overdue or at-risk tasks</div>';
      return;
    }
    el.innerHTML = '<div class="adherence-list">' + items.map(it => {
      const dotColor = it.isOverdue ? 'var(--high)' : 'var(--inprog)';
      const priBadge = it.priority ? '<span class="adh-badge adh-badge-' + esc(it.priority) + '">' + esc(it.priority) + '</span>' : '';
      const statusBadge = it.isOverdue
        ? '<span class="adh-badge adh-badge-overdue">overdue</span>'
        : '<span class="adh-badge adh-badge-risk">at risk</span>';
      return '<div class="adherence-item">' +
        '<span class="adh-dot" style="background:' + dotColor + '"></span>' +
        '<div class="adh-content">' +
          '<div class="adh-title" title="' + esc(it.title) + '">' + esc(it.title) + '</div>' +
          '<div class="adh-meta">' + esc(it.boardName) + ' \u2022 ' + esc(it.label) + '</div>' +
          '<div class="adh-badges">' + priBadge + statusBadge + '</div>' +
        '</div>' +
        '<div class="adh-pct">' +
          '<div class="adh-pct-ring" style="--pct:' + it.pct + '">' +
            '<span class="adh-pct-val">' + it.pct + '%</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  renderHistogram(buckets) {
    const el = document.getElementById('progressHist');
    if (!el) return;
    const bars = buckets.map(b =>
      '<div class="hist-col">' +
        '<div class="hist-val">' + b.count + '</div>' +
        '<div class="hist-bar" style="--h:' + b.hPct + '"></div>' +
      '</div>'
    ).join('');
    const labels = buckets.map(b =>
      '<div class="hist-col"><div class="hist-label">' + b.label + '</div></div>'
    ).join('');
    el.innerHTML = '<div class="histogram">' +
      '<div class="hist-bars">' + bars + '</div>' +
      '<div style="display:flex;justify-content:space-around;padding:0 12px;gap:8px">' + labels + '</div>' +
    '</div>';
  }
}

// ── DashboardApp ─────────────────────────────────────────
class DashboardApp {
  constructor() {
    this.model = new DashboardModel();
    this.renderer = new DashboardRenderer();
    this.rawData = null;
    this.filterBoardId = 'all';
    this._exposeGlobals();
  }

  _exposeGlobals() {
    window.loadData = json => this.loadData(json);
    window.setTheme = t => document.documentElement.setAttribute('data-theme', t);
    window.filterBoard = val => { this.filterBoardId = val; this.refresh(); };
  }

  loadData(json) {
    this.rawData = typeof json === 'string' ? JSON.parse(json) : json;
    this.refresh();
  }

  refresh() {
    if (!this.rawData) return;
    this.model.load(this.rawData, this.filterBoardId);
    this.renderer.renderAll(this.model);
  }

}

// ── Bootstrap ────────────────────────────────────────────
const dashApp = new DashboardApp();
</script>
